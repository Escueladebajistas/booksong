<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SongBook Live</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

#menu{
    padding:20px;
}

#menu h1{
    text-align:center;
    color:#FFD700;
}

.songBtn{
    width:100%;
    padding:18px;
    margin-bottom:10px;
    background:#111;
    color:white;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    text-align:left;
}

.songBtn:hover{
    background:#222;
}

#viewer{
    display:none;
    padding:20px;
    padding-bottom:100px;
}

#titulo{
    text-align:center;
    color:#FFD700;
    font-size:48px;
    margin-bottom:10px;
}

#artista{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
}

.seccion{
    background:#111;
    margin-bottom:25px;
    padding:20px;
    border-radius:10px;
    border-left:5px solid #FFD700;
}

.nombre{
    color:#00E5FF;
    font-size:30px;
    margin-bottom:15px;
    font-weight:bold;
}

.acordes{
    font-size:48px;
    white-space:pre-wrap;
    line-height:1.8;
    font-weight:bold;
}

.controles{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    padding:12px;
    display:flex;
    justify-content:center;
    gap:10px;
    border-top:1px solid #333;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn-menu{
    background:#444;
    color:white;
}

.btn-zoom{
    background:#1976d2;
    color:white;
}

.btn-scroll{
    background:#c62828;
    color:white;
}

@media(max-width:768px){

    #titulo{
        font-size:36px;
    }

    .acordes{
        font-size:36px;
    }

    .nombre{
        font-size:24px;
    }

}
</style>

</head>
<body>

<div id="menu">

<h1>🎵 SongBook Live</h1>

<div id="listaCanciones"></div>

</div>

<div id="viewer">

<h1 id="titulo"></h1>
<h3 id="artista"></h3>

<div id="contenidoCancion"></div>

</div>

<div class="controles">

<button class="btn-menu" onclick="volver()">
📚 Repertorio
</button>

<button class="btn-zoom" onclick="zoomMas()">
A+
</button>

<button class="btn-zoom" onclick="zoomMenos()">
A-
</button>

<button class="btn-scroll" onclick="autoScroll()">
▶ Autoscroll
</button>

</div>

<script>

secciones:[

},
{

contenido:`Am / G / F / Em / C

},

},

},
{

contenido:`Em / B7 / Em / B7 / C7M`
},

},

}

}

];


let fontSize = 48;
let scroll = null;

function cargarMenu(){

let html='';

canciones.forEach((cancion,index)=>{

html += `
<button class="songBtn"
onclick="abrirCancion(${index})">
🎵 ${cancion.titulo}
<br>
<small>${cancion.artista}</small>
</button>
`;

});

document.getElementById("listaCanciones").innerHTML = html;

}

function abrirCancion(index){

const cancion = canciones[index];

document.getElementById("menu").style.display="none";
document.getElementById("viewer").style.display="block";

document.getElementById("titulo").innerText = cancion.titulo;
document.getElementById("artista").innerText = cancion.artista;

let html='';

cancion.secciones.forEach(sec=>{

html += `
<div class="seccion">

<div class="nombre">
${sec.nombre}
</div>

<div class="acordes">
${sec.contenido}
</div>

</div>
`;

});

document.getElementById("contenidoCancion").innerHTML = html;

window.scrollTo(0,0);

}

function volver(){

document.getElementById("viewer").style.display="none";
document.getElementById("menu").style.display="block";

window.scrollTo(0,0);

}

function zoomMas(){

fontSize += 4;

document.querySelectorAll('.acordes')
.forEach(el=>{
el.style.fontSize = fontSize + 'px';
});

}

function zoomMenos(){

if(fontSize > 20){

fontSize -= 4;

document.querySelectorAll('.acordes')
.forEach(el=>{
el.style.fontSize = fontSize + 'px';
});

}

}

function autoScroll(){

if(scroll){

clearInterval(scroll);
scroll = null;
return;

}

scroll = setInterval(()=>{

window.scrollBy(0,1);

},25);

}

cargarMenu();

</script>

</body>
</html>
