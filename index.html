<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SongBook Live</title>

<style>

body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

#menu{
    padding:20px;
}

#menu h1{
    text-align:center;
    color:#FFD700;
}

.songBtn{
    width:100%;
    padding:18px;
    margin-bottom:10px;
    background:#111;
    color:white;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
}

.songBtn:hover{
    background:#222;
}

#viewer{
    display:none;
    padding:20px;
}

#titulo{
    text-align:center;
    color:#FFD700;
    font-size:48px;
}

#artista{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
}

.seccion{
    background:#111;
    margin-bottom:25px;
    padding:20px;
    border-radius:10px;
}

.nombre{
    color:#00E5FF;
    font-size:30px;
    margin-bottom:15px;
}

.acordes{
    font-size:48px;
    white-space:pre-wrap;
    line-height:1.8;
}

.controles{
    position:fixed;
    bottom:15px;
    right:15px;
    display:flex;
    gap:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

</style>

</head>
<body>

<div id="menu">

<h1>🎵 Repertorio</h1>

<div id="listaCanciones"></div>

</div>

<div id="viewer">

<h1 id="titulo"></h1>
<h3 id="artista"></h3>

<div id="contenidoCancion"></div>

</div>

<div class="controles">

<button onclick="volver()">📚</button>

<button onclick="zoomMas()">A+</button>

<button onclick="zoomMenos()">A-</button>

<button onclick="autoScroll()">▶</button>

</div>

<script>

const canciones = [

{
titulo:"Las Flores",
artista:"Café Tacvba",
secciones:[
{
nombre:"INTRO",
contenido:`Bb   Dm   Eb   F
Bb   Dm   Eb   F
Bb   Dm   Eb   F
Bb   Dm   Eb   F`
},
{
nombre:"ESTROFA",
contenido:`Bb   Dm   Eb   F
Bb   Dm   Eb   F`
},
{
nombre:"ESTRIBILLO",
contenido:`Dm   Eb
Dm   Eb`
}
]
}

];

let fontSize = 48;
let scroll = null;

function cargarMenu(){

let html='';

canciones.forEach((cancion,index)=>{

html += `
<button class="songBtn"
onclick="abrirCancion(${index})">
${cancion.titulo}
</button>
`;

});

document.getElementById("listaCanciones").innerHTML = html;

}

function abrirCancion(index){

const cancion = canciones[index];

menu.style.display="none";
viewer.style.display="block";

titulo.innerText = cancion.titulo;
artista.innerText = cancion.artista;

let html='';

cancion.secciones.forEach(sec=>{

html += `
<div class="seccion">

<div class="nombre">
${sec.nombre}
</div>

<div class="acordes">
${sec.contenido}
</div>

</div>
`;

});

contenidoCancion.innerHTML = html;

}

function volver(){

viewer.style.display="none";
menu.style.display="block";

window.scrollTo(0,0);

}

function zoomMas(){

fontSize += 4;

document.querySelectorAll('.acordes')
.forEach(el=>{
el.style.fontSize = fontSize + 'px';
});

}

function zoomMenos(){

fontSize -= 4;

document.querySelectorAll('.acordes')
.forEach(el=>{
el.style.fontSize = fontSize + 'px';
});

}

function autoScroll(){

if(scroll){

clearInterval(scroll);
scroll=null;
return;

}

scroll=setInterval(()=>{

window.scrollBy(0,1);

},25);

}

cargarMenu();

</script>

</body>
</html>
